version: 1
project:
  name: "autonomous-wiki"
  domain: ""
  description: "Autonomous LLM Wiki — agents chain automatically to discover, ingest, cross-reference, and maintain the wiki with minimal supervision"
  created: ""

knowledge:
  source_types:
    - documents
    - articles
    - data
  organization: entity-first
  scale: medium

agents:
  tool: claude-code
  enabled:
    - ingestion
    - query
    - lint
    - research
    - debate
    - librarian
    - analysis
  party_mode: false

workflows:
  ingestion_style: autonomous
  outputs:
    - markdown
  tools:
    - search
    - stats

wiki:
  frontmatter: true
  citation_format: inline
  cross_ref_style: wikilink

maturity:
  research_sources_min: 3
  review_pages_min: 5
  synthesis_pages_min: 3
