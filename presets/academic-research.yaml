version: 1
project:
  name: "academic-research"
  domain: ""
  description: "Academic research knowledge base with paper-focused ingestion"
  created: ""

knowledge:
  source_types:
    - documents
    - articles
  organization: thesis-driven
  scale: medium

agents:
  tool: claude-code
  enabled:
    - ingestion
    - query
    - lint
    - research
    - debate
    - librarian
  party_mode: false

workflows:
  ingestion_style: deliberate
  outputs:
    - markdown
    - obsidian
  tools:
    - search
    - stats

wiki:
  frontmatter: true
  citation_format: academic
  cross_ref_style: wikilink

maturity:
  research_sources_min: 3
  review_pages_min: 5
  synthesis_pages_min: 3
